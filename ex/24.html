就職、決まったそうね。おめでとう。
취직, 결정됐다며? 축하해.

先生に口添えをしてもらって、やっとな。
선생님이 잘 얘기해주셔서 겨우.

後でちゃんとお礼言わなくちゃね。
나중에 제대로 감사인사 드려야겠네.


※「口添えをする」(주선을 하다)는 일이 잘 되도록 여러 가지 방법으로 힘쓰는 것을 말한다. 
이를테면 「知人のために口添えをする」(지인을 위해 주선을 하다)와 같이 쓸 수 있다. 
やっと  : 겨우 
ちゃんと  : 제대로, 확실히 
お礼言う  [おれい(を)いう] : 감사인사를 하다
