昨夜はぐでんぐでんに酔ってたわよ。
어젯밤엔 곤드레만드레 취했었어.

ああ、今朝目が覚めたら駅の構内だったよ。
아-, 오늘 아침에 눈을 떴더니 역 구내였어.

まったく、あきれるわね。
정말, 기가 막히네.

관련단어
※「ぐでんぐでんに酔う」는 ‘곤드레만드레 취하다’라는 뜻으로, 
「ぐでんぐでん」(곤드레만드레)은 술에 몹시 취해 정신이 없는 모양을 나타내는 말이고,
「酔う」는 ‘(술에) 취하다’라는 의미다.

目が覚める  [めがさめる] : 눈을 뜨다, 잠에서 깨다 
あきれる  : 기가 막히다, 질리다
