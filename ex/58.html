今度のチームは平均年齢が 21歳よ。
이번 팀은 평균 연령이 21세야.

若いチームは血気にはやりやすいな。
젊은 팀은 혈기에 치우치기 쉽지.

ベテランのまとめ役が必要ね。
베테랑 책임자가 필요해.

※「血気にはやる」(혈기에 치우치다)는 분별 없이 기운만 믿고 일을 벌일 때 쓰는 표현으로, 
여기서 「はやる」는 ‘용솟음치다’라는 의미로 쓰였다. 

まとめ役  [まとめやく] : 조정역, 책임자 
~やすい  : (동사의 ます형에 붙어서)～하기 쉽다
