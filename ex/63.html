今度の選挙は、２人の決戦になりましたね。	
이번 선거는 두 사람의 결전이 되었네요.

両陣営とも総力戦ですね。	
양 진영 모두 총력전을 벌이고 있네요.

市民の選択は、どちらでしょうね。	
시민의 선택은 어느 쪽일까요?

※「決戦になる」(결전이 되다)에서 「決戦」(결전)은 ‘승부를 결정짓는 싸움’을 뜻하는 말로, 「今度の総選挙は両党の決戦になるだろう」(이번 총선거는 양당의 결전이 되겠지)와 같이 쓴다.
