飯田さんって、見識がありますね。
이이다 씨, 식견이 있네요.

どんな質問にも的確に答えてくれますよね。
어떤 질문에도 정확하게 대답해 주죠.

本当に頭が下がりますね。
정말로 고개가 숙여지네요.

-----------------------
* 학습정보

※「見識がある」는 ‘식견이 있다’라는 뜻으로, 여기서 「見識」(견식, 식견)는 ‘사물에 대한 견문과 학식, 사물을 분별할 수 있는 능력’을 뜻하는 말이다. 

-----------------------
* 관련단어

頭が下がる[あたまがさがる] : 고개가 숙여지다
