天ぷらなのに油で揚げないんですか。
튀김인데 기름으로 안 튀겨요?

ええ、今までの常識を覆す商品です。
네, 지금까지의 상식을 뒤엎는 상품이에요.

僕にはまだ、ぴんと来ないですね。
저는 아직 이해가 안 되네요.


※「常識を覆す」는 ‘상식을 뒤엎다’라는 뜻으로, 여기서 「覆す」는 ‘뒤엎다, 번복하다’라는 의미로 쓰였다. 
예를 들어 「常識を覆す考え」라고 하면 ‘상식을 뒤엎는 생각’이라는 뜻이다. 
揚げる  [あげる] : 튀기다 
ぴんと来る  [ぴんとくる] : 즉각 깨닫다
