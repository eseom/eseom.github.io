<meta charset="utf-8"><pre>接客で一番大切なことは何ですか。
손님을 대할 때 가장 중요한 건 뭐예요?

お客様の気持ちをくみ取ることです。
손님의 기분을 헤아리는 거예요.

なかなか難しいことですね。
꽤 어려운 일이네요.

관련단어
※「気持ちをくみ取る」(기분을 헤아리다)에서 「くみ取る」는 ‘(미루어) 헤아리다, 이해하다’라는 뜻으로 쓰여,
 「相手の気持ちをくみ取る」라고 하면 ‘상대의 기분을 헤아리다’라는 뜻이다.

一番  [いちばん] : 가장, 제일 
大切  [たいせつ] : 중요함 
なかなか  : 꽤, 상당히 </pre>
