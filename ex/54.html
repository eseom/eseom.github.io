新企画のチーム長、引き受けたんだって。
새 기획팀장, 맡았다면서.

これ以上断りきれなくなってね。
더 이상 거절할 수 없어서 말이야.

やっと、決意を固めてくれたんだね。
드디어 결심을 단단히 했군.

※뜻을 정하여 굳게 마음을 먹거나 그런 마음일 때 「決意を固める」(결의를 굳히다)라고 한다. 
여기서 「固める」는 ‘확고히 하다, 단단히 하다’라는 뜻으로 쓰였다.
引き受ける  [ひきうける] : 맡다 
断る  [ことわる] : 거절하다 
~きれない  : (동사의 ます형에 붙어서)～할 수 없다
