何してるの。私にも見せて。
뭐 하고 있어? 나한테도 보여줘.

あっ、だめ。見せられるもんじゃないよ。
앗, 안 돼. 보여줄 수 있는 게 아니야.

また何か変なことを企ててるんでしょう。
또 뭔가 이상한 짓을 꾸미고 있지?


※「～を企てる」는 ‘~을 꾸미다[계획하다]’라는 뜻으로, 예를 들면 「陰謀を企てる」(음모를 꾸미다), 
「事業を企てる」(사업을 계획하다)와 같이 쓸 수 있다. 
見せる  [みせる] : (～에게) 보이다 
だめ  : 안 됨 
変  [へん] : 이상함, 수상함
