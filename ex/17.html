おはよう。やっと正気に返ったようね。
안녕. 겨우 정신을 차린 것 같네.

ああ、まだ頭はがんがんするけど。
아-, 아직 머리가 지끈거리지만.

ゆうべは大騒ぎで、大変だったんだから。
어젯밤은 대소동으로 힘들었으니까 말이야.


※「正気に返る」는 ‘정신을 차리다’라는 뜻으로, 「正気」는 ‘제정신, 온전한 정신’, 
「返る」는 ‘원래 상태대로 되다’라는 의미다. 같은 의미의 표현으로는 「正気に戻る」가 있다.
頭ががんがんする  [あたまががんがんする] : 머리가 지끈거리다 
大騒ぎ  [おおさわぎ] : 대소동
