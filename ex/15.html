<meta charset="utf-8"><pre>他言しないようにって言ったのに。
남한테 말하지 말아 달라고 했는데.

ごめん、うっかりと口走っちゃった。
미안, 무심코 말해 버렸어.

まったく、口が軽いんだから。
정말, 입이 가볍다니까.

관련단어
※「うっかりと」는 ‘무심코’, 「口走る」는 ‘저도 모르게 말해 버리다’라는 뜻으로,
 「うっかりと口走る」라고 하면 ‘무심코 말해 버리다’라는 의미다. 
「ついうっかりと口走る」(그만 무심코 말해 버리다)처럼 쓴다.

他言  [たごん] : (비밀을) 남에게 말함 
まったく  : 정말 
口が軽い  [くちがかるい] : 입이 가볍다 </pre>
