あの子、ベンチで悔し泣きをしてるわ。
저 아이, 벤치에서 분해서 울고 있어.

よっぽど、勝ちたかったんだろうな。
어지간히 이기고 싶었던 거지.

味方のエラーで逆転負けだからね。
자기편 실책으로 역전패했으니까


※「悔し泣きをする」는 ‘분해서 울다’라는 뜻으로, 
예를 들어 「決勝戦に敗れて悔し泣きをする」라고 하면 ‘결승전에서 지고 분해서 울다’라는 의미다. 
よっぽど  : 꽤, 어지간히 
勝つ  [かつ] : 이기다 
味方  [みかた] : 자기편
