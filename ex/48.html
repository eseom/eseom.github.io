岩田さん、責任逃れしか言わないわ。
이와타 씨, 책임 회피하는 말밖에 안 해.

まったく煮え切らないよな。
정말 우유부단하군.

男らしくけじめをつけてほしいわ。
명백히 해 줬으면 해.

※「けじめをつける」는 ‘(구별을) 분명히 하다’라는 뜻으로, 「けじめ」는 ‘(밝혀 두어야 할) 구별, 구분’이라는 의미다. 예를 들면 「公私のけじめをつける」(공사의 구별을 분명히 하다)와 같이 쓴다. 

責任逃れ  [せきにんのがれ] : 책임 회피 
煮え切らない  [にえきらない] : (태도가) 애매하다, 미적지근하다
