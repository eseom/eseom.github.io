大雨で水かさが増し続けているね。
폭우로 수량이 계속 불어나고 있네.

このままじゃ、堤防が決壊するかもな。
이대로라면 제방이 무너질 수도 있겠구나.

早めに避難した方がよさそうね。
일찌감치 피난가는 게 좋을 것 같네.


※「堤防」는 ‘제방, 둑’, 「決壊する」는 ‘제방 따위가 터져 무너지다’라는 뜻으로, 예를 들어 「洪水で堤防が決壊する」라고 하면 ‘홍수로 제방이 무너지다’라는 의미다.

水かさ  [みずかさ] : (강물 등의) 수량 
増す  [ます] : 불어나다 
早めに  [はやめに] : 일찌감치
