相手に手の内を読まれてますね。
상대에게 속셈을 들켜버렸네요.

軽率に振舞うべきではなかったよ。
경솔하게 행동하지 말았어야 했어.

今となっては致し方ありませんね。
이제는 하는 수 없네요.


※조심성 없이 가볍게 행동할 때 「軽率に振舞う」(경솔하게 행동하다)라고 한다. 여기서 「軽率」는 ‘경솔, (말이나 행동이) 가벼움’, 「振舞う」는 ‘행동하다, 처신하다’라는 뜻이다. 

手の内  [てのうち] : 속셈 
読む  [よむ] : 알아차리다, 간파하다 
致し方  [いたしかた] : 하는 수
