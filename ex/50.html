※상대편의 실력이 수준 이상으로 강할 때 「けた外れの強さだ」(월등히 강하다)라는 표현을 쓴다. 「けた外れ」는 ‘월등히’라는 뜻으로, ‘표준을 훨씬 넘음, 보통이 아님’을 나타낸다.

～に比べて  [～にくらべて] : ～에 비해서 
違う  [ちがう] : 다르다 
~すぎる  : (동사의 ます형에 붙어서) 너무 ~하다 </pre>
