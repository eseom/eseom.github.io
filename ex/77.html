* 학습정보

そろそろ現役を退く時期かな。
이제 슬슬 현역에서 은퇴할 시기인가?

あら、まだ頑張れるんじゃないですか。	
어머, 아직 다닐 수 있지 않아요?

ぼつぼつ後継者を育てないとな。	
슬슬 후계자를 양성해야지.

------------------
* 관련단어

※「現役を退く」는 ‘현역에서 은퇴하다’라는 뜻으로, 여기서 「現役」는 ‘현재 어떤 직무에서 활약하고 있는 사람, 또는 그 일’, 「退く」는 ‘사퇴하다, 은퇴하다’라는 의미다.

頑張る : 버티다, 노력하다
育てる : 키우다, 양성하다</pre>
