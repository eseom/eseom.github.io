<meta charset="utf-8"><pre>どうしてあんなこと言ったのよ。	
왜 그런 말을 한 거야?

すみません。つい、かっとなって。	
미안해요. 그만 발끈해서.

言行を慎むようにしないと。	
언행을 삼가도록 해야겠네.

----------------------------
* 학습정보
말과 행동을 조심할 때 「言行を慎む」(언행을 삼가다)라고 하는데, 여기서 「慎む」는 ‘삼가다’라는 뜻으로 쓰였다. 같은 의미의 표현으로는 「言動を慎む」(언동을 삼가다)가 있다.

----------------------------
* 관련단어
つい	: 그만, 무심코
かっとなる : 발끈하다</pre>
