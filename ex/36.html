来年度の事業計画が発表されましたね。

해외투자나 신제품 개발 등 가득하네요.

※「～に計上する」는 ‘～에 계상하다’라는 뜻으로, 「計上する」는 ‘계산하여 올리다’라는 뜻이다. 예를 들어 「予算に設備費を計上する」라고 하면 ‘예산에 설비비를 계상하다’라는 의미다. 
満載  [まんさい] : 만재, 가득 실음
