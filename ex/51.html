そんな方法で本当にうまくいくの。
그런 방법으로 하면 정말 잘 될까?

人のやり方にいちいちけちをつけるなよ。
사람 하는 거에 일일이 트집을 잡지 마.

失敗しても八つ当たりしないでね。
실패해도 분풀이하지 마.


※조그만 흠집을 들추어내거나 없는 흠집을 만들 때 「けちをつける」(트집을 잡다)를 쓰는데, 
이를테면 「ごとごとにけちをつける」(사사건건 트집을 잡는다)와 같이 쓴다. 
やり方  [やりかた] : (하는) 방법 
八つ当たり  [やつあたり] : 아무한테나 마구잡이로 분풀이함
